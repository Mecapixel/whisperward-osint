name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # The semantic correlation test loads the all-MiniLM-L6-v2 embedding
      # model. Caching the HuggingFace directory means the ~90MB download
      # happens once, and subsequent runs restore it in seconds. If the cache
      # is cold and the download fails for any reason, the test skips
      # gracefully rather than failing the build.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-minilm-l6-v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run test suite
        run: python -m pytest -q
